<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Wet Nose Weather · Output</title>
  <link rel="icon" href="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'&gt;&lt;circle cx='32' cy='32' r='28' fill='%2300c9b8'/&gt;&lt;/svg&gt;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:#07080d; --surface:#0d1117; --border:#1a2535; --border2:#243145;
      --accent:#00c9b8; --accent-dim:#006e67;
      --text:#6888a4; --text-mid:#94afc8; --text-bright:#cde0f0;
      --font-mono:'Share Tech Mono',monospace; --font-ui:'Barlow Condensed',sans-serif;
      --sev-extreme:#ff2d55; --sev-severe:#ff9f0a;
      --sev-moderate:#ffd60a; --sev-minor:#30d158; --sev-unknown:#3a4f66;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1920px;height:1080px;overflow:hidden;background:var(--bg);
      color:var(--text-bright);font-family:var(--font-mono);cursor:none}

    /* ── Offline overlay ── */
    #offline-overlay{position:fixed;inset:0;z-index:9999;background:#000;
      display:none;align-items:flex-end;justify-content:flex-end;padding:14px 18px}
    #offline-overlay.visible{display:flex}
    #offline-dot{width:6px;height:6px;border-radius:50%;background:#1c1c1c}

    /* ── NWS tile error toast ── */
    #nws-toast{position:fixed;bottom:14px;left:18px;z-index:500;
      font-family:var(--font-ui);font-size:10px;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--sev-moderate);
      display:none;align-items:center;gap:6px}
    #nws-toast.visible{display:flex}
    #nws-toast-dot{width:6px;height:6px;border-radius:50%;background:var(--sev-moderate)}

    /* ── Banner ── */
    #alert-banner{height:42px;display:flex;align-items:center;padding:0 18px;gap:12px;
      background:var(--surface);border-bottom:1px solid var(--border)}
    #brand{display:flex;align-items:center;gap:8px;flex-shrink:0;
      font-family:var(--font-ui);font-size:13px;font-weight:700;letter-spacing:.18em;
      text-transform:uppercase;color:var(--accent)}
    #brand svg{width:22px;height:22px;display:block}
    #banner-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);
      flex-shrink:0;transition:background .4s}
    #banner-dot.pulse{animation:dot-pulse 2.5s ease-in-out infinite}
    @keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.55}}
    #banner-text{flex:1;font-family:var(--font-ui);font-size:15px;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);transition:color .3s}
    #banner-meta{display:flex;align-items:center;gap:20px;
      font-family:var(--font-ui);font-size:11px;letter-spacing:.1em;
      color:var(--text);text-transform:uppercase}
    #clock{color:var(--accent);font-family:var(--font-mono);font-size:14px;letter-spacing:.08em}

    /* ── Main layout ── */
    #main{display:flex;height:calc(1080px - 42px)}
    #map{flex:1}

    /* ── Sidebar ── */
    #alert-sidebar{width:380px;flex-shrink:0;background:var(--surface);
      border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    #alert-sidebar.hidden{display:none}
    #sidebar-head{padding:11px 16px;font-family:var(--font-ui);font-size:10px;
      font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text);
      border-bottom:1px solid var(--border);display:flex;align-items:center;
      justify-content:space-between;flex-shrink:0}
    #alert-count-badge{background:var(--accent);color:var(--bg);font-size:11px;
      font-weight:700;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center}
    #alert-list{flex:1;overflow-y:hidden;padding:10px;display:flex;
      flex-direction:column;gap:8px}
    .no-alerts{display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:50px 20px;gap:10px;color:var(--text);
      font-family:var(--font-ui);font-size:13px;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;text-align:center;opacity:.5}
    .no-alerts-icon{font-size:30px;opacity:.4;margin-bottom:4px}
    .alert-card{background:var(--bg);border:1px solid var(--border);
      border-left-width:4px;border-radius:3px;padding:11px 14px}
    .alert-card.extreme{border-left-color:var(--sev-extreme)}
    .alert-card.severe{border-left-color:var(--sev-severe)}
    .alert-card.moderate{border-left-color:var(--sev-moderate)}
    .alert-card.minor{border-left-color:var(--sev-minor)}
    .alert-card.unknown{border-left-color:var(--sev-unknown)}
    .card-sev-badge{display:inline-block;font-family:var(--font-ui);font-size:10px;
      font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      padding:2px 6px;border-radius:2px;margin-bottom:6px}
    .badge-extreme{background:var(--sev-extreme);color:#fff}
    .badge-severe{background:var(--sev-severe);color:#000}
    .badge-moderate{background:var(--sev-moderate);color:#000}
    .badge-minor{background:var(--sev-minor);color:#000}
    .badge-unknown{background:var(--sev-unknown);color:var(--text-mid)}
    .card-event{font-family:var(--font-ui);font-size:15px;font-weight:700;
      letter-spacing:.04em;text-transform:uppercase;color:var(--text-bright);margin-bottom:5px}
    .card-headline{font-size:11px;color:var(--text-mid);line-height:1.45;margin-bottom:5px}
    .card-meta{font-size:10px;color:var(--accent-dim);letter-spacing:.04em}
    #sidebar-footer{padding:8px 16px;font-size:10px;color:var(--text);
      border-top:1px solid var(--border);flex-shrink:0;letter-spacing:.04em;
      display:flex;justify-content:space-between}
    #source-label{color:var(--accent-dim);font-family:var(--font-ui);font-size:10px;
      font-weight:700;letter-spacing:.1em;text-transform:uppercase}

    /* ── Leaflet overrides ── */
    .leaflet-control-attribution{background:rgba(7,8,13,.7)!important;
      color:#2a4060!important;font-size:9px!important}
    .leaflet-control-attribution a{color:#2a4060!important}
    .leaflet-control-zoom{display:none!important}

    /* ── Alert polygon popup (no pointer events needed) ── */
    .leaflet-popup-content-wrapper{background:var(--surface)!important;
      color:var(--text-bright)!important;border:1px solid var(--border)!important;
      border-radius:3px!important;font-family:var(--font-ui)!important;font-size:12px!important}
    .leaflet-popup-tip{background:var(--surface)!important}
  </style>
</head>
<body>

<div id="offline-overlay"><div id="offline-dot"></div></div>
<div id="nws-toast"><div id="nws-toast-dot"></div><span>NWS tiles unavailable</span></div>

<div id="alert-banner">
  <div id="brand" title="Wet Nose Weather">
    <svg viewBox="0 0 64 64" aria-hidden="true">
      <!-- Dog nose: rounded triangular muzzle with two nostril slits -->
      <path fill="currentColor"
            d="M32 8c-13 0-22 8.5-22 19 0 7.8 5.4 13.7 11.6 17.6C26 47.3 28 50.4 28 53.5c0 3 1.8 4.5 4 4.5s4-1.5 4-4.5c0-3.1 2-6.2 6.4-8.9C48.6 40.7 54 34.8 54 27c0-10.5-9-19-22-19z"/>
      <ellipse cx="24" cy="26" rx="3.2" ry="6" fill="#07080d"/>
      <ellipse cx="40" cy="26" rx="3.2" ry="6" fill="#07080d"/>
      <path d="M32 36c-2 0-3.5 1.2-3.5 3 0 1.5 1.2 2.5 3.5 2.5s3.5-1 3.5-2.5c0-1.8-1.5-3-3.5-3z" fill="#07080d" opacity=".55"/>
    </svg>
    <span>Wet Nose Weather</span>
  </div>
  <div id="banner-dot"></div>
  <div id="banner-text">Initializing...</div>
  <div id="banner-meta">
    <span id="source-label">—</span>
    <span id="timestamp-display" style="color:var(--accent);font-size:12px;letter-spacing:.04em">—</span>
    <span id="clock">—</span>
  </div>
</div>

<div id="main">
  <div id="map"></div>
  <div id="alert-sidebar">
    <div id="sidebar-head">
      <span>Active Alerts</span>
      <span id="alert-count-badge">—</span>
    </div>
    <div id="alert-list">
      <div class="no-alerts"><div class="no-alerts-icon">📡</div><div>Loading...</div></div>
    </div>
    <div id="sidebar-footer">
      <span id="alerts-updated">—</span>
      <span id="reload-countdown">—</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Config ───────────────────────────────────────────────
const HEALTH_INTERVAL    = 5  * 1000;
const SETTINGS_INTERVAL  = 10 * 1000;
const ALERT_INTERVAL     = 5  * 60 * 1000;
const HARD_RELOAD_MS     = 15 * 60 * 1000;
const NWS_WMS_BASE       = 'https://opengeo.ncep.noaa.gov/geoserver/conus/ows';
const IEM_WMS_BASE       = 'https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi';
const IEM_WMS_LAYER      = 'nexrad-n0q-wmst';
const NWS_FRAME_COUNT    = 8;            // animated WMS frames
const NWS_FRAME_STEP_MIN = 5;            // minutes between frames
const HURRICANE_WMS      = 'https://nowcoast.noaa.gov/arcgis/services/nowcoast/wwa_meteocean_tropicalcyclones_trackintensityfcsts_time/MapServer/WmsServer';
const NM_TO_M            = 1852;

const SEV_COLORS = {
  extreme:  {fill:'#ff2d55',stroke:'#ff2d55',fillOp:.35,strokeOp:.85},
  severe:   {fill:'#ff9f0a',stroke:'#ff9f0a',fillOp:.25,strokeOp:.80},
  moderate: {fill:'#ffd60a',stroke:'#ffd60a',fillOp:.20,strokeOp:.75},
  minor:    {fill:'#30d158',stroke:'#30d158',fillOp:.15,strokeOp:.65},
  unknown:  {fill:'#3a4f66',stroke:'#3a4f66',fillOp:.15,strokeOp:.50},
};
const SEV_DISPLAY = {
  extreme:'var(--sev-extreme)', severe:'var(--sev-severe)',
  moderate:'var(--sev-moderate)', minor:'var(--sev-minor)', unknown:'var(--sev-unknown)',
};

// ── State ────────────────────────────────────────────────
let map, settings;
let radarFrames=[], frameMeta=[], currentFrame=-1;
let animTimer=null, nwsRedrawTimer=null;
let polygonLayer=null, satelliteLayer=null, hurricaneLayer=null;
let ringLayers=[], stationCoords={};
let pinLayer=null, pinRadiusLayer=null, pinLabelLayer=null;
let stormCellLayer=null, stormCellTimer=null;
const MI_TO_M = 1609.344;
const STORM_PROJECT_MIN = 30;        // minutes ahead to draw the track
const STORM_REFRESH_MS  = 60 * 1000; // poll cadence
let isOffline=false, settingsTs=0, reloadAt=Date.now()+HARD_RELOAD_MS;
let prevFrameLayer=null;

// ── Clock ────────────────────────────────────────────────
function updateClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const rem=Math.max(0,reloadAt-Date.now());
  document.getElementById('reload-countdown').textContent =
    `Reload in ${Math.floor(rem/60000)}:${String(Math.floor((rem%60000)/1000)).padStart(2,'0')}`;
}
setInterval(updateClock,1000); updateClock();

// ── Map init ─────────────────────────────────────────────
function initMap(s){
  map=L.map('map',{
    center:[s.map_lat||28.5383, s.map_lon||-81.3792],
    zoom:s.map_zoom||8,
    zoomControl:false, dragging:false, touchZoom:false,
    scrollWheelZoom:false, doubleClickZoom:false,
    boxZoom:false, keyboard:false, tap:false,
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19,
  }).addTo(map);
}

// ── RainViewer ───────────────────────────────────────────
async function loadRainViewer(s){
  try{
    const data=await fetch('/api/rainviewer',{cache:'no-store'}).then(r=>r.json());
    if(!data.radar?.past) throw new Error('No radar data');
    // Preserve the API's `path` field — past frames use /v2/radar/<time>
    // but nowcast paths look like /v2/radar/nowcast_<hash>, so we can't
    // reconstruct the URL from `time` alone.
    const host=data.host||'https://tilecache.rainviewer.com';
    const frames=[
      ...(data.radar.past||[])   .map(f=>({time:f.time,path:f.path,type:'past'   })),
      ...(data.radar.nowcast||[]).map(f=>({time:f.time,path:f.path,type:'nowcast'})),
    ];
    if(!frames.length) throw new Error('No frames');

    // Stage new layers before removing old (smooth transition)
    const newLayers=[], color=s.rv_color??6;
    frames.forEach(f=>{
      const l=L.tileLayer(
        `${host}${f.path}/256/{z}/{x}/{y}/${color}/1_1.png`,
        {opacity:0,zIndex:200}
      ).addTo(map);
      newLayers.push(l);
    });

    // Remove old layers after new ones are staged
    radarFrames.forEach(l=>map.removeLayer(l));
    radarFrames=newLayers; frameMeta=frames;

    const slider=document.getElementById('frame-slider');
    if(slider){slider.max=frames.length-1; slider.value=frames.length-1;}

    // Load satellite IR if enabled (free RainViewer tier; lightning requires paid API)
    if(s.show_satellite_ir && data.satellite?.infrared?.length){
      loadSatelliteIR(data.satellite.infrared, s);
    }

    showFrame(frames.length-1);
    if(!animTimer) startAnimation(s.anim_speed||500);

  }catch(e){ console.error('RainViewer load error:',e); }
}

function showFrame(idx){
  if(idx<0||idx>=radarFrames.length) return;
  // Pre-stage next frame (set to near-zero opacity so tiles load)
  const next=(idx+1)%radarFrames.length;
  if(radarFrames[next]&&next!==currentFrame) radarFrames[next].setOpacity(0.001);

  if(currentFrame>=0&&radarFrames[currentFrame]) radarFrames[currentFrame].setOpacity(0);
  currentFrame=idx;
  radarFrames[currentFrame].setOpacity(settings?.opacity/100??0.7);

  const m=frameMeta[idx];
  if(m){
    const d=new Date(m.time*1000);
    const tag=m.type==='nowcast'?'▶ FCST':'◀ PAST';
    document.getElementById('timestamp-display')&&
      (document.getElementById('timestamp-display').textContent=
        `${tag}  ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`);
  }
}

function startAnimation(speed){
  if(animTimer) clearInterval(animTimer);
  animTimer=setInterval(()=>showFrame((currentFrame+1)%radarFrames.length),speed);
}

async function checkForNewFrames(s){
  if(isOffline||s.radar_source!=='rainviewer') return;
  try{
    const data=await fetch('/api/rainviewer',{cache:'no-store'}).then(r=>r.json());
    if(!data.radar?.past) return;
    const frames=[...(data.radar.past||[]),...(data.radar.nowcast||[])];
    if(frames[frames.length-1]?.time!==frameMeta[frameMeta.length-1]?.time){
      if(animTimer){clearInterval(animTimer);animTimer=null;}
      await loadRainViewer(s);
    }
  }catch(e){}
}

// ── Satellite IR (RainViewer free tier) ───────────────────
function loadSatelliteIR(irFrames, s){
  if(satelliteLayer){map.removeLayer(satelliteLayer);satelliteLayer=null;}
  if(!irFrames?.length) return;
  // RainViewer satellite uses hash-based paths from the API response
  const latest=irFrames[irFrames.length-1];
  const host='https://tilecache.rainviewer.com';
  satelliteLayer=L.tileLayer(
    `${host}${latest.path}/256/{z}/{x}/{y}/0/0_0.png`,
    {opacity:(s.opacity/100)*0.6, zIndex:150, attribution:'RainViewer Satellite IR'}
  ).addTo(map);
}

// ── NWS WMS (animated via TIME dimension) ─────────────────
function buildNWSFrames(){
  // Align to NWS_FRAME_STEP_MIN-minute boundaries, then walk backward.
  const stepMs = NWS_FRAME_STEP_MIN * 60 * 1000;
  const latest = Math.floor(Date.now() / stepMs) * stepMs;
  const frames = [];
  for(let i = NWS_FRAME_COUNT - 1; i >= 0; i--){
    const ms = latest - i * stepMs;
    frames.push({
      time: Math.floor(ms / 1000),
      iso:  new Date(ms).toISOString(),
      type: 'past',
    });
  }
  return frames;
}

// Generic WMS-T frame loader, shared by NWS (NCEP CONUS composite) and
// IEM (super-res N0Q ~0.5° × 250m). spec = { base, layer, attribution }.
function loadWMSFrames(s, spec){
  // Tear down any existing frames (RainViewer or stale WMS).
  radarFrames.forEach(l => map.removeLayer(l));
  radarFrames = [];
  if(animTimer){ clearInterval(animTimer); animTimer = null; }

  const frames = buildNWSFrames();
  let nwsErrors = 0;
  frames.forEach(f => {
    const l = L.tileLayer.wms(spec.base, {
      layers:      spec.layer,
      format:      'image/png',
      transparent: true,
      time:        f.iso,
      opacity:     0,
      zIndex:      200,
      attribution: spec.attribution,
    }).addTo(map);
    l.on('tileload',  () => {
      nwsErrors = 0;
      document.getElementById('nws-toast').classList.remove('visible');
    });
    l.on('tileerror', () => {
      nwsErrors++;
      if(nwsErrors >= 3) document.getElementById('nws-toast').classList.add('visible');
    });
    radarFrames.push(l);
  });
  frameMeta = frames;

  const slider = document.getElementById('frame-slider');
  if(slider){ slider.max = frames.length - 1; slider.value = frames.length - 1; }

  currentFrame = -1;
  showFrame(frames.length - 1);
  startAnimation(s.anim_speed || 500);

  startWMSPolling(s, spec);
}

function loadNWSLayer(s){
  loadWMSFrames(s, {
    base:        NWS_WMS_BASE,
    layer:       s.nws_product || 'conus_bref_qcd',
    attribution: 'NOAA/NWS',
  });
}

function loadIEMLayer(s){
  loadWMSFrames(s, {
    base:        IEM_WMS_BASE,
    layer:       IEM_WMS_LAYER,
    attribution: 'Iowa Environmental Mesonet (NEXRAD N0Q super-res)',
  });
}

async function checkForNewWMSFrame(s, spec){
  if(isOffline) return;
  if(s.radar_source !== 'nws' && s.radar_source !== 'iem') return;
  const stepMs    = NWS_FRAME_STEP_MIN * 60 * 1000;
  const latestSec = Math.floor(Date.now() / stepMs) * stepMs / 1000;
  if(frameMeta.length && frameMeta[frameMeta.length - 1].time !== latestSec){
    loadWMSFrames(s, spec);
  }
}

async function startWMSPolling(s, spec){
  await refreshVCPStatus();
  // Re-fetch VCP status periodically so the header stays accurate.
  setInterval(async () => {
    if(settings.radar_source === 'nws' || settings.radar_source === 'iem'){
      await refreshVCPStatus();
    }
  }, 5 * 60 * 1000);
  // Rebuild the frame-set when a new step boundary becomes available.
  if(nwsRedrawTimer) clearInterval(nwsRedrawTimer);
  nwsRedrawTimer = setInterval(() => checkForNewWMSFrame(settings, spec), 60 * 1000);
}

async function refreshVCPStatus(){
  try{
    const st = await fetch('/api/radar_status', {cache:'no-store'}).then(r => r.json());
    updateVCPDisplay(st);
  }catch(e){ /* keep last-known header */ }
}

function updateVCPDisplay(st){
  const station=st.station||'KMLB';
  const vcp=st.vcp?`VCP ${st.vcp}`:'VCP —';
  const age=st.age_minutes!=null?` · ${Math.round(st.age_minutes)}m ago`:'';
  const fb=st.fallback?' ⚠ FALLBACK':'';
  const prefix=settings && settings.radar_source==='iem' ? 'IEM N0Q · ' : '';
  document.getElementById('source-label').textContent=
    `${prefix}${station} · ${vcp} · ${st.mode||'—'} · ${st.label||''}${age}${fb}`;
}

// ── Alert polygons ────────────────────────────────────────
async function loadAlertPolygons(){
  if(polygonLayer){map.removeLayer(polygonLayer); polygonLayer=null;}
  if(!settings?.show_alert_polygons) return;
  try{
    const data=await fetch('/api/alert_polygons',{cache:'no-store'}).then(r=>r.json());
    if(!data.features?.length) return;
    polygonLayer=L.geoJSON(data,{
      style:f=>{
        const sev=(f.properties?.severity||'unknown').toLowerCase();
        const c=SEV_COLORS[sev]||SEV_COLORS.unknown;
        return{fillColor:c.fill,fillOpacity:c.fillOp,
               color:c.stroke,opacity:c.strokeOp,weight:2};
      },
      onEachFeature:()=>{}  // no popups on output page
    }).addTo(map);
  }catch(e){}
}

// ── Range rings ───────────────────────────────────────────
async function loadRangeRings(){
  ringLayers.forEach(l=>map.removeLayer(l)); ringLayers=[];
  if(!settings?.show_range_rings) return;
  try{
    const coords=await fetch('/api/station_coords').then(r=>r.json());
    const sid=settings.range_ring_station||'KMLB';
    const sc=coords[sid];
    if(!sc) return;
    [50,100,200].forEach((nm,i)=>{
      const l=L.circle([sc.lat,sc.lon],{
        radius:nm*NM_TO_M,
        color:'#4a6080',weight:1,dashArray:'4 6',
        fillOpacity:0,opacity:0.5,zIndex:250,
      }).addTo(map);
      const label=L.marker([sc.lat+(nm*NM_TO_M/111319.5),sc.lon],{
        icon:L.divIcon({
          html:`<span style="font-family:var(--font-ui);font-size:9px;color:#4a6080;letter-spacing:.08em">${nm}nm</span>`,
          className:'',iconAnchor:[0,0]
        })
      }).addTo(map);
      ringLayers.push(l,label);
    });
  }catch(e){}
}

// ── Pin + radius ──────────────────────────────────────────
function clearPin(){
  [pinLayer,pinRadiusLayer,pinLabelLayer].forEach(l=>{if(l) map.removeLayer(l);});
  pinLayer=pinRadiusLayer=pinLabelLayer=null;
}
function loadPin(){
  clearPin();
  if(!settings?.pin_enabled) return;
  const lat=Number(settings.pin_lat), lon=Number(settings.pin_lon);
  if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;

  if(settings.pin_radius_enabled){
    const miles=Number(settings.pin_radius_miles)||10;
    pinRadiusLayer=L.circle([lat,lon],{
      radius:miles*MI_TO_M,
      color:'#00c9b8',weight:1.5,dashArray:'4 6',
      fillColor:'#00c9b8',fillOpacity:0.06,opacity:0.7
    }).addTo(map);
  }
  pinLayer=L.marker([lat,lon],{
    icon:L.divIcon({
      html:'<div style="width:14px;height:14px;border-radius:50%;background:#00c9b8;'
          +'border:2px solid #07080d;box-shadow:0 0 0 2px #00c9b8,0 0 8px rgba(0,201,184,.8)"></div>',
      className:'',iconSize:[14,14],iconAnchor:[7,7]
    })
  }).addTo(map);
  const label=(settings.pin_label||'').trim();
  if(label){
    pinLabelLayer=L.marker([lat,lon],{
      icon:L.divIcon({
        html:'<span style="font-family:var(--font-ui);font-size:11px;font-weight:700;'
            +'letter-spacing:.12em;text-transform:uppercase;color:#cde0f0;'
            +'background:rgba(7,8,13,.85);padding:2px 6px;border:1px solid #00c9b8;'
            +'border-radius:2px;white-space:nowrap">'
            +label.replace(/[<>&"']/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c]))
            +'</span>',
        className:'',iconAnchor:[-10,8]
      })
    }).addTo(map);
  }
}

// ── Storm cell tracks (IEM NEXRAD storm-attributes) ──────
// Reads property names case-insensitively because IEM has shipped both
// uppercase (DRCT, SPEED, MAX_DBZ, STORM_ID) and lowercase variants.
function getProp(props, ...names){
  if(!props) return undefined;
  for(const n of names){
    if(props[n] !== undefined) return props[n];
    const u = n.toUpperCase(), l = n.toLowerCase();
    if(props[u] !== undefined) return props[u];
    if(props[l] !== undefined) return props[l];
  }
  return undefined;
}

function projectLatLon(lat, lon, bearingDeg, distanceKm){
  // Flat-earth projection — fine for ~30 min storm motion at NEXRAD scales.
  const br = bearingDeg * Math.PI / 180;
  const dlat = (distanceKm * Math.cos(br)) / 111.32;
  const dlon = (distanceKm * Math.sin(br)) / (111.32 * Math.cos(lat * Math.PI / 180));
  return [lat + dlat, lon + dlon];
}

function loadStormCells(){
  if(stormCellLayer){ map.removeLayer(stormCellLayer); stormCellLayer = null; }
  if(stormCellTimer){ clearInterval(stormCellTimer); stormCellTimer = null; }
  if(!settings?.show_storm_cells) return;

  const fetchAndRender = async () => {
    try{
      const data = await fetch('/api/storm_cells', {cache:'no-store'}).then(r => r.json());
      if(stormCellLayer){ map.removeLayer(stormCellLayer); stormCellLayer = null; }
      const features = (data && data.features) || [];
      if(!features.length) return;

      const group = L.layerGroup();
      features.forEach(f => {
        const coords = f.geometry && f.geometry.coordinates;
        if(!coords || coords.length < 2) return;
        const [lon, lat] = coords;
        if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        const id    = getProp(f.properties, 'storm_id', 'STORM_ID', 'id') || '?';
        const dbz   = getProp(f.properties, 'max_dbz',  'MAX_DBZ', 'dbz');
        const drct  = Number(getProp(f.properties, 'drct',  'DRCT'));
        const speed = Number(getProp(f.properties, 'sknt', 'speed', 'SPEED', 'SKNT'));

        // Projected track line (only when motion is known and meaningful).
        if(Number.isFinite(drct) && Number.isFinite(speed) && speed > 0){
          const distKm = speed * 1.852 * (STORM_PROJECT_MIN / 60);
          const end    = projectLatLon(lat, lon, drct, distKm);
          L.polyline([[lat, lon], end], {
            color:'#ff9f0a', weight:1.8, opacity:0.85, dashArray:'6 4'
          }).addTo(group);
          // Small head marker
          L.circleMarker(end, {
            radius:3, color:'#ff9f0a', weight:1.5, fillColor:'#ff9f0a',
            fillOpacity:0.9
          }).addTo(group);
        }

        // Cell marker
        L.circleMarker([lat, lon], {
          radius:5, color:'#ff453a', weight:2, fillColor:'#ff453a',
          fillOpacity:0.85
        }).addTo(group);

        // Light label: ID + dBZ
        const labelText = (dbz !== undefined && dbz !== null && Number.isFinite(Number(dbz)))
          ? `${id} · ${Math.round(Number(dbz))}dBZ`
          : `${id}`;
        const safe = String(labelText).replace(/[<>&"']/g, c =>
          ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
        L.marker([lat, lon], {
          icon: L.divIcon({
            html: '<span style="font-family:var(--font-ui);font-size:10px;font-weight:700;'
                + 'letter-spacing:.08em;color:#fff;background:rgba(7,8,13,.78);'
                + 'padding:1px 5px;border:1px solid #ff453a;border-radius:2px;'
                + 'white-space:nowrap">' + safe + '</span>',
            className:'', iconAnchor:[-8, 6]
          }),
          interactive:false
        }).addTo(group);
      });
      group.addTo(map);
      stormCellLayer = group;
    }catch(e){ /* swallow — kiosk should keep going */ }
  };

  fetchAndRender();
  stormCellTimer = setInterval(fetchAndRender, STORM_REFRESH_MS);
}

// ── Hurricane WMS ─────────────────────────────────────────
function loadHurricaneLayer(){
  if(hurricaneLayer){map.removeLayer(hurricaneLayer); hurricaneLayer=null;}
  if(!settings?.show_hurricane) return;
  // nowCOAST tropical cyclones WMS — shows nothing when no active storms
  hurricaneLayer=L.tileLayer.wms(HURRICANE_WMS,{
    layers:'0',format:'image/png',transparent:true,
    opacity:0.85,zIndex:280,attribution:'NOAA NHC/nowCOAST',
  }).addTo(map);
}

// ── Alerts ────────────────────────────────────────────────
async function fetchAlerts(){
  try{
    const data=await fetch('/api/alerts',{cache:'no-store'}).then(r=>r.json());
    const alerts=(data.features||[]).sort((a,b)=>
      (({Extreme:4,Severe:3,Moderate:2,Minor:1,Unknown:0}[b.properties?.severity]??0)-
       ({Extreme:4,Severe:3,Moderate:2,Minor:1,Unknown:0}[a.properties?.severity]??0)));
    renderBanner(alerts); renderSidebar(alerts);
    document.getElementById('alerts-updated').textContent=
      `Alerts: ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    // Refresh polygons when alerts refresh
    await loadAlertPolygons();
  }catch(e){ console.error('Alert error:',e); }
}

function renderBanner(alerts){
  const dot=document.getElementById('banner-dot');
  const text=document.getElementById('banner-text');
  if(!alerts.length){
    dot.style.background='var(--border2)'; dot.classList.remove('pulse');
    text.style.color='var(--text-mid)'; text.textContent='No Active Alerts';
    return;
  }
  const top=alerts[0].properties;
  const sev=(top.severity||'Unknown').toLowerCase();
  const col=SEV_DISPLAY[sev]||SEV_DISPLAY.unknown;
  dot.style.background=col; dot.style.color=col; dot.classList.add('pulse');
  text.style.color=col;
  text.textContent=`${(top.severity||'UNKNOWN').toUpperCase()}: ${top.event||'Alert'} — ${alerts.length===1?'1 Alert':`${alerts.length} Alerts`} in Effect`;
}

function renderSidebar(alerts){
  const list=document.getElementById('alert-list');
  const badge=document.getElementById('alert-count-badge');
  badge.textContent=alerts.length;
  if(!alerts.length){
    list.innerHTML='<div class="no-alerts"><div class="no-alerts-icon">✓</div><div>No active alerts</div></div>';
    return;
  }
  list.innerHTML=alerts.slice(0,7).map(f=>{
    const p=f.properties||{};
    const sev=(p.severity||'Unknown').toLowerCase();
    return`<div class="alert-card ${sev}">
      <div class="card-sev-badge badge-${sev}">${p.severity||'Unknown'}</div>
      <div class="card-event">${p.event||'Alert'}</div>
      <div class="card-headline">${(p.headline||'').slice(0,110)}${(p.headline||'').length>110?'…':''}</div>
      <div class="card-meta">Expires ${formatTime(p.expires||p.ends)}</div>
    </div>`;
  }).join('');
}

function formatTime(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── Health / settings polling ─────────────────────────────
async function checkHealth(){
  try{
    await fetch('/api/health',{cache:'no-store',signal:AbortSignal.timeout(4000)});
    if(isOffline) location.reload();
    isOffline=false;
    document.getElementById('offline-overlay').classList.remove('visible');
  }catch(e){
    isOffline=true;
    document.getElementById('offline-overlay').classList.add('visible');
    if(animTimer){clearInterval(animTimer);animTimer=null;}
  }
}

async function checkSettings(){
  if(isOffline) return;
  try{
    const s=await fetch('/api/settings',{cache:'no-store'}).then(r=>r.json());
    if(s.updated_at&&s.updated_at!==settingsTs) location.reload();
  }catch(e){}
}

// ── Init ──────────────────────────────────────────────────
async function init(){
  try{
    settings=await fetch('/api/settings',{cache:'no-store'}).then(r=>r.json());
    settingsTs=settings.updated_at||0;
  }catch(e){
    isOffline=true;
    document.getElementById('offline-overlay').classList.add('visible');
    setInterval(checkHealth,HEALTH_INTERVAL);
    return;
  }

  if(!settings.show_sidebar)
    document.getElementById('alert-sidebar').classList.add('hidden');

  initMap(settings);
  await loadRangeRings();
  loadPin();
  loadHurricaneLayer();
  loadStormCells();

  if(settings.radar_source==='rainviewer'){
    document.getElementById('source-label').textContent='RainViewer';
    await loadRainViewer(settings);
    setInterval(()=>checkForNewFrames(settings),60*1000);
  }else if(settings.radar_source==='iem'){
    loadIEMLayer(settings);
  }else{
    loadNWSLayer(settings);
  }

  await fetchAlerts();
  setInterval(fetchAlerts,ALERT_INTERVAL);
  setInterval(checkHealth,HEALTH_INTERVAL);
  setInterval(checkSettings,SETTINGS_INTERVAL);
  setTimeout(()=>location.reload(),HARD_RELOAD_MS);
}

init();
</script>
